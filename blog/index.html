<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — CarouselForge | Carousel Tips, LinkedIn &amp; Instagram Guides</title>
  <meta name="description" content="Learn how to create stunning social media carousels. Tips, guides and strategies for LinkedIn, Instagram, Twitter and more.">
  <meta name="keywords" content="carousel tips, linkedin carousel guide, instagram carousel, social media strategy, content creation">
  <meta name="author" content="CarouselForge">
  <link rel="canonical" href="https://carouselforge.app/blog/">
  <meta property="og:title" content="Blog — CarouselForge">
  <meta property="og:description" content="Tips, guides and strategies for creating stunning social media carousels.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://carouselforge.app/icons/icon-512.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/png" sizes="512x512" href="../icons/icon-512.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Blog",
    "name": "CarouselForge Blog",
    "url": "https://carouselforge.app/blog/",
    "description": "Tips, guides and strategies for creating stunning social media carousels.",
    "publisher": { "@type": "Organization", "name": "CarouselForge", "url": "https://carouselforge.app" }
  }
  </script>
  <style>
    /* Blog-specific styles — inherits all colours from ../style.css */
    .blog-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 64px; position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-subtle);
    }
    .blog-nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .blog-nav-logo span { font-size: 1.1rem; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .blog-nav-links { display: flex; align-items: center; gap: 24px; }
    .blog-nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
    .blog-nav-links a:hover, .blog-nav-links a.active { color: var(--accent-primary); }
    .blog-nav-btn {
      background: var(--accent-primary); color: #fff; border: none; border-radius: 8px;
      padding: 9px 18px; font-size: 0.85rem; font-weight: 600; cursor: pointer;
      text-decoration: none; font-family: inherit; transition: all 0.2s;
    }
    .blog-nav-btn:hover { background: #2563eb; transform: translateY(-1px); }

    /* HERO */
    .blog-hero {
      text-align: center; padding: 72px 24px 48px;
      background: linear-gradient(180deg, rgba(59,130,246,0.04) 0%, transparent 100%);
    }
    .blog-hero-badge {
      display: inline-block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--accent-primary);
      background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2);
      padding: 4px 14px; border-radius: 999px; margin-bottom: 20px;
    }
    .blog-hero h1 {
      font-size: clamp(2rem, 5vw, 3rem); font-weight: 900; letter-spacing: -0.03em;
      color: var(--text-primary); margin-bottom: 16px; line-height: 1.15;
    }
    .blog-hero h1 span { background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .blog-hero p { font-size: 1.1rem; color: var(--text-secondary); max-width: 520px; margin: 0 auto; }

    /* FILTERS */
    .filters { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 0 24px 40px; }
    .filter-btn {
      padding: 7px 18px; border-radius: 999px; font-size: 0.82rem; font-weight: 500;
      border: 1px solid var(--border-subtle); background: #fff;
      color: var(--text-secondary); cursor: pointer; font-family: inherit; transition: all 0.2s;
      box-shadow: var(--shadow-sm);
    }
    .filter-btn:hover { border-color: var(--accent-primary); color: var(--accent-primary); }
    .filter-btn.active { background: var(--accent-primary); border-color: var(--accent-primary); color: #fff; box-shadow: var(--shadow-md); }

    /* GRID */
    .blog-container { max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; }
    .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }

    .post-card {
      background: #fff; border: 1px solid var(--border-subtle); border-radius: var(--radius-lg);
      overflow: hidden; text-decoration: none; display: flex; flex-direction: column;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      box-shadow: var(--shadow-sm);
    }
    .post-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: rgba(59,130,246,0.25); }

    .post-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
    .post-thumb-placeholder {
      width: 100%; aspect-ratio: 16/9;
      background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 50%, #e0e7ff 100%);
      display: flex; align-items: center; justify-content: center; font-size: 2.5rem;
    }
    .post-body { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .post-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .post-category {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
      background: rgba(59,130,246,0.08); color: var(--accent-primary);
      padding: 3px 10px; border-radius: 999px; border: 1px solid rgba(59,130,246,0.15);
    }
    .post-date { font-size: 0.78rem; color: var(--text-muted); }
    .post-title { font-size: 1.05rem; font-weight: 700; color: var(--text-primary); line-height: 1.4; }
    .post-desc { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; flex: 1; }
    .post-read-more {
      font-size: 0.82rem; font-weight: 600; color: var(--accent-primary);
      display: inline-flex; align-items: center; gap: 4px; margin-top: 4px;
    }

    /* STATES */
    .loading-state, .empty-state, .error-state {
      text-align: center; padding: 80px 24px; color: var(--text-secondary); grid-column: 1/-1;
    }
    .loading-spinner {
      width: 40px; height: 40px; border: 3px solid var(--border-subtle);
      border-top-color: var(--accent-primary); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* FOOTER */
    .blog-footer {
      border-top: 1px solid var(--border-subtle); text-align: center;
      padding: 24px; font-size: 0.82rem; color: var(--text-muted);
      display: flex; align-items: center; justify-content: center; gap: 16px;
    }
    .blog-footer a { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .blog-footer a:hover { color: var(--accent-primary); }

    @media (max-width: 640px) {
      .blog-nav { padding: 0 16px; }
      .blog-nav-links .hide-mobile { display: none; }
      .blog-hero { padding: 48px 16px 32px; }
    }
  </style>
</head>
<body>

  <nav class="blog-nav">
    <a href="../" class="blog-nav-logo">
      <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
        <rect x="2" y="2" width="10" height="10" rx="2" fill="#818cf8"/>
        <rect x="16" y="2" width="10" height="10" rx="2" fill="#c084fc"/>
        <rect x="2" y="16" width="10" height="10" rx="2" fill="#f472b6"/>
        <rect x="16" y="16" width="10" height="10" rx="2" fill="#fb923c"/>
      </svg>
      <span>CarouselForge</span>
    </a>
    <div class="blog-nav-links">
      <a href="../" class="hide-mobile">Home</a>
      <a href="../blog/" class="active">Blog</a>
      <a href="../about.html" class="hide-mobile">About</a>
      <a href="../" class="blog-nav-btn">Create Free &#8594;</a>
    </div>
  </nav>

  <div class="blog-hero">
    <div class="blog-hero-badge">&#128293; Tips &amp; Guides</div>
    <h1>The <span>CarouselForge</span> Blog</h1>
    <p>Tips, guides &amp; strategies to create scroll-stopping social media carousels.</p>
  </div>

  <div class="filters" id="filtersBar">
    <button class="filter-btn active" data-filter="all">All Posts</button>
    <button class="filter-btn" data-filter="Tips & Tricks">Tips &amp; Tricks</button>
    <button class="filter-btn" data-filter="LinkedIn">LinkedIn</button>
    <button class="filter-btn" data-filter="Instagram">Instagram</button>
    <button class="filter-btn" data-filter="Design">Design</button>
    <button class="filter-btn" data-filter="Social Media">Social Media</button>
  </div>

  <div class="blog-container">
    <div class="posts-grid" id="postsGrid">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <p>Loading posts...</p>
      </div>
    </div>
  </div>

  <footer class="blog-footer">
    <span>&#169; 2026 CarouselForge</span>
    <a href="../privacy.html">Privacy</a>
    <a href="../terms.html">Terms</a>
    <a href="../contact.html">Contact</a>
  </footer>

  <script>
    const REPO = 'aiwithibrar/carousel';
    const BRANCH = 'main';
    const POSTS_PATH = 'blog/posts';
    const RAW_BASE = 'https://raw.githubusercontent.com/' + REPO + '/' + BRANCH + '/';
    const API_BASE = 'https://api.github.com/repos/' + REPO + '/contents/' + POSTS_PATH;

    var allPosts = [];

    function parseFrontmatter(text) {
      var match = text.match(/^---\n([\s\S]*?)\n---/);
      if (!match) return { body: text, meta: {} };
      var yamlStr = match[1]; var meta = {};
      yamlStr.split('\n').forEach(function(line) {
        var colonIdx = line.indexOf(':'); if (colonIdx === -1) return;
        var key = line.slice(0, colonIdx).trim();
        var val = line.slice(colonIdx + 1).trim();
        if (val.length >= 2 && ((val[0] === '"' && val[val.length-1] === '"') || (val[0] === "'" && val[val.length-1] === "'"))) val = val.slice(1,-1);
        meta[key] = val;
      });
      return { body: text.slice(match[0].length).trim(), meta: meta };
    }

    function formatDate(d) {
      if (!d) return '';
      try { return new Date(d).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }); }
      catch(e) { return d; }
    }

    function categoryEmoji(cat) {
      var m = { 'LinkedIn': '&#128188;', 'Instagram': '&#128247;', 'Tips & Tricks': '&#128161;', 'Design': '&#127912;', 'Social Media': '&#128241;', 'News': '&#128240;' };
      return m[cat] || '&#128203;';
    }

    function renderPosts(posts) {
      var grid = document.getElementById('postsGrid');
      if (!posts.length) {
        grid.innerHTML = '<div class="empty-state"><div style="font-size:3rem;margin-bottom:16px">&#128235;</div><h3 style="color:var(--text-primary);margin-bottom:8px">No posts yet</h3><p>Check back soon for tips and guides!</p></div>';
        return;
      }
      grid.innerHTML = posts.map(function(post) {
        var thumb = post.thumbnail
          ? '<img class="post-thumb" src="' + post.thumbnail + '" alt="' + (post.title||'') + '" loading="lazy">'
          : '';
        var placeholder = '<div class="post-thumb-placeholder"' + (post.thumbnail ? ' style="display:none"' : '') + '>' + categoryEmoji(post.category) + '</div>';
        return '<a href="../blog/post.html?slug=' + encodeURIComponent(post.slug) + '" class="post-card">' +
          thumb + placeholder +
          '<div class="post-body">' +
            '<div class="post-meta">' +
              (post.category ? '<span class="post-category">' + post.category + '</span>' : '') +
              '<span class="post-date">' + formatDate(post.date) + '</span>' +
            '</div>' +
            '<div class="post-title">' + (post.title || 'Untitled') + '</div>' +
            '<div class="post-desc">' + (post.description || '') + '</div>' +
            '<span class="post-read-more">Read article &#8594;</span>' +
          '</div>' +
        '</a>';
      }).join('');
    }

    document.getElementById('filtersBar').addEventListener('click', function(e) {
      var btn = e.target.closest('.filter-btn');
      if (!btn) return;
      var filter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.filter === filter); });
      renderPosts(filter === 'all' ? allPosts : allPosts.filter(function(p) { return p.category === filter; }));
    });

    async function loadPosts() {
      var grid = document.getElementById('postsGrid');
      try {
        var res = await fetch(API_BASE);
        if (!res.ok) throw new Error('failed');
        var files = await res.json();
        var mdFiles = files.filter(function(f) { return f.name.endsWith('.md'); });
        if (!mdFiles.length) {
          grid.innerHTML = '<div class="empty-state"><div style="font-size:3rem;margin-bottom:16px">&#9997;&#65039;</div><h3 style="color:var(--text-primary);margin-bottom:8px">Coming soon!</h3><p>First posts are on the way.</p></div>';
          return;
        }
        var posts = await Promise.all(mdFiles.map(async function(file) {
          var raw = await fetch(RAW_BASE + POSTS_PATH + '/' + file.name);
          var text = await raw.text();
          var parsed = parseFrontmatter(text);
          return Object.assign({}, parsed.meta, { slug: file.name.replace('.md', '') });
        }));
        allPosts = posts.filter(function(p) { return p.title; }).sort(function(a,b) { return new Date(b.date) - new Date(a.date); });
        renderPosts(allPosts);
      } catch(err) {
        grid.innerHTML = '<div class="error-state"><div style="font-size:2.5rem;margin-bottom:12px">&#9888;&#65039;</div><p>Could not load posts. Please try again later.</p></div>';
      }
    }

    loadPosts();
  </script>
</body>
</html>
